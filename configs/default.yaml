# Default training configuration for BERT News Classifier
# Usage: python src/train.py (uses these defaults via argparse)

model:
  name: bert-base-uncased
  num_classes: 4
  dropout: 0.3
  freeze_embeddings: true
  use_multi_layer_head: false
  label_smoothing: 0.1

training:
  learning_rate: 2e-5          # Searched: [1e-5, 2e-5, 3e-5, 5e-5]
  epochs: 5
  batch_size: 32
  max_sequence_length: 256
  weight_decay: 0.01           # L2 regularization via AdamW
  warmup_ratio: 0.1
  early_stopping_patience: 2
  gradient_clip_norm: 1.0

data:
  dataset: ag_news
  train_val_test_split: [0.8, 0.1, 0.1]
  remove_duplicates: true
  num_workers: 4

reproducibility:
  seed: 42
  cudnn_deterministic: true
  cudnn_benchmark: false

tracking:
  tool: mlflow
  experiment_name: bert-news-classifier

serving:
  host: 0.0.0.0
  port: 8000
  workers: 2
  max_batch_size: 64
